font_family      FiraCode Nerd Font
font_size        10

# Don't lose a window by accident.
# - Always ask before closing an OS window / quitting (1 = window has >=1 kitty
#   window, i.e. always prompt). Gates the close shortcut, the title-bar close
#   button, and the quit action.
# - ctrl+q does nothing at all (common "quit" muscle-memory key -> dead).
# Note: background jobs started with nohup/disown survive a window close
# regardless of these settings; this only guards the interactive session.
confirm_os_window_close 1
map ctrl+q no_op

# Monokai Pro
background       #2D2A2E
foreground       #FCFCFA
selection_background #5B595C
selection_foreground #FCFCFA
cursor           #FCFCFA
cursor_text_color background

