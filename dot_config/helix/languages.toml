[[language]]
name = "clojure"
language-servers = ["clojure-lsp", "typedclojure-lsp"]

[language.debugger]
name = "clojure-dap"
transport = "stdio"
command = "clojure"
args = ["-Sdeps", "{:deps {uk.me.oli/clojure-dap {:mvn/version \"RELEASE\"}}}", "-X", "clojure-dap.main/run"]

[[language.debugger.templates]]
name = "Attach to nREPL"
request = "attach"
args = {}

[language-server.typedclojure-lsp]
command = ".typedclojure-lsp/start"
